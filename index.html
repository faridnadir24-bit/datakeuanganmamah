<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Mamah — Pencatatan Setoran</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --card: #1e2333;
  --border: #2a3045;
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #e8eaf0;
  --muted: #7a8299;
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* --- HEADER --- */
header{background:linear-gradient(135deg,#1a1f35 0%,#0f1117 100%);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.app-title{font-size:1.2rem;font-weight:700;letter-spacing:-.5px}
.app-sub{font-size:.75rem;color:var(--muted);margin-top:1px}
header .spacer{flex:1}
.header-stats{display:flex;gap:20px}
.hstat{text-align:right}
.hstat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:600}
.hstat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* --- TOOLBAR --- */
.toolbar{padding:16px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 36px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.btn{padding:9px 16px;border-radius:8px;border:none;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
select.filter-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-family:inherit;font-size:.82rem;cursor:pointer;outline:none}
select.filter-sel:focus{border-color:var(--accent)}

/* --- SUMMARY CARDS --- */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;padding:18px 28px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;inset:0;opacity:.04;background:var(--card-accent,var(--accent))}
.sum-card-icon{font-size:20px;margin-bottom:8px}
.sum-card-val{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700}
.sum-card-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* --- BULAN TABS --- */
.month-tabs{padding:0 28px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.mtab{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.2s}
.mtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mtab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.month-totals-row{padding:8px 28px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.month-totals-row::-webkit-scrollbar{display:none}
.mtotal-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.72rem;white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}
.mtotal-chip .chip-label{font-family:'Sora',sans-serif;color:var(--muted);font-size:.68rem}

/* --- TABLE --- */
.table-wrap{padding:0 28px 28px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
thead th{background:var(--surface);padding:10px 14px;text-align:left;font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);position:sticky;top:0;border-bottom:2px solid var(--border);white-space:nowrap}
thead th:first-child{border-radius:8px 0 0 0}
thead th:last-child{border-radius:0 8px 0 0}
tbody tr{transition:.15s}
tbody tr:hover td{background:rgba(79,142,247,.05)}
tbody td{padding:9px 14px;border-bottom:1px solid rgba(42,48,69,.5);vertical-align:middle;white-space:nowrap}
.td-no{color:var(--muted);font-size:.72rem;font-family:'JetBrains Mono',monospace;width:42px}
.td-name{font-weight:600;color:var(--text)}
.paket-badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.68rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
.cell-money{font-family:'JetBrains Mono',monospace;text-align:right;font-size:.8rem}
.cell-kurang{color:var(--red);background:rgba(239,68,68,.1)}
.cell-lebih{color:var(--green);background:rgba(34,197,94,.1)}
.cell-pas{color:var(--text)}
.cell-empty{color:var(--muted);font-size:.7rem}
.total-row td{background:var(--surface);font-weight:700;border-top:2px solid var(--accent)}
.total-row .td-name{color:var(--accent)}
.row-total-col{background:rgba(79,142,247,.07);font-weight:700;color:var(--accent)}

/* --- STATUS DOT --- */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-red{background:var(--red)}
.dot-green{background:var(--green)}
.dot-gray{background:var(--muted)}

/* --- MODAL --- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.hidden{display:none}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* --- INPUT CELL IN TABLE --- */
.cell-input{width:68px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;text-align:right;outline:none;transition:.2s}
.cell-input:focus{border-color:var(--accent);background:rgba(79,142,247,.07)}

/* --- PAKET MANAGER --- */
.paket-manager{padding:10px 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:rgba(30,35,51,.5);border-bottom:1px solid var(--border)}
.paket-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.75rem}
.paket-chip-name{font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.paket-chip-val{color:var(--muted)}
.paket-chip-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;font-size:13px;line-height:1;transition:.15s}
.paket-chip-del:hover{color:var(--red)}

/* --- TABS NAV --- */
.nav-tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface);margin-top:14px}
.ntab{padding:12px 18px;border:none;background:none;color:var(--muted);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* --- ANALYTICS --- */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;padding:20px 28px}
.ana-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.ana-card h3{font-size:.85rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:.75rem;width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.5s}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);width:55px;text-align:right}

/* --- RESPONSIVE --- */
@media(max-width:600px){
  header{padding:12px 16px}.header-stats{gap:12px}
  .toolbar,.summary-row,.month-tabs,.month-totals-row,.table-wrap,.paket-manager,.analytics-grid,.nav-tabs{padding-left:12px;padding-right:12px}
}

/* --- TOAST --- */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:.82rem;z-index:999;transform:translateY(60px);opacity:0;transition:.3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="logo">💰</div>
  <div>
    <div class="app-title">Kasir Mamah</div>
    <div class="app-sub">Pencatatan Setoran Arisan / Internet</div>
  </div>
  <div class="spacer"></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="hTotalAnggota">0</div>
      <div class="hstat-lbl">Anggota</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hTotalBulanIni" style="color:var(--accent)">Rp 0</div>
      <div class="hstat-lbl">Bulan Ini</div>
    </div>
  </div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="ntab active" onclick="switchView('tabel')">📋 Tabel Data</button>
  <button class="ntab" onclick="switchView('analitik')">📊 Analitik</button>
  <button class="ntab" onclick="switchView('paket')">⚙️ Kelola Paket</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari nama anggota..." oninput="renderTable()">
  </div>
  <select class="filter-sel" id="filterPaket" onchange="renderTable()">
    <option value="">Semua Paket</option>
  </select>
  <select class="filter-sel" id="filterStatus" onchange="renderTable()">
    <option value="">Semua Status</option>
    <option value="kurang">🔴 Kurang</option>
    <option value="lebih">🟢 Lebih</option>
    <option value="pas">⚪ Pas</option>
    <option value="belum">Belum Bayar</option>
  </select>
  <button class="btn btn-primary" onclick="openAddModal()">+ Tambah Anggota</button>
  <button class="btn btn-green" onclick="exportExcel()">⬇️ Export Excel</button>
  <button class="btn btn-ghost" onclick="openImportModal()">⬆️ Import Excel</button>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-row" id="summaryRow"></div>

<!-- MONTH TABS -->
<div id="viewTabel">
  <div class="month-tabs" id="monthTabs"></div>
  <div class="month-totals-row" id="monthTotalsRow"></div>
  <div class="table-wrap" id="tableWrap"></div>
</div>

<!-- ANALYTICS VIEW -->
<div id="viewAnalitik" style="display:none">
  <div class="analytics-grid" id="analyticsGrid"></div>
</div>

<!-- PAKET VIEW -->
<div id="viewPaket" style="display:none">
  <div style="padding:20px 28px">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;max-width:500px">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:16px">⚙️ Kelola Paket Internet</h3>
      <div id="paketList" style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px"></div>
      <div style="display:flex;gap:10px;align-items:flex-end;margin-top:16px">
        <div class="form-group" style="margin:0;flex:1">
          <label>Nama Paket</label>
          <input id="newPaketNama" type="text" placeholder="cth: 5rb">
        </div>
        <div class="form-group" style="margin:0;flex:1">
          <label>Harga / Bulan (rb)</label>
          <input id="newPaketHarga" type="number" placeholder="cth: 150">
        </div>
        <button class="btn btn-primary" onclick="addPaket()">+ Tambah</button>
      </div>
      <p style="font-size:.72rem;color:var(--muted);margin-top:10px">* Harga adalah setoran normal per bulan dalam ribuan (rb)</p>
    </div>
  </div>
</div>

<!-- MODAL TAMBAH / EDIT ANGGOTA -->
<div class="overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2><span>👤</span> <span id="modalTitle">Tambah Anggota</span></h2>
    <div class="form-group">
      <label>Nama</label>
      <input id="fNama" type="text" placeholder="Nama anggota">
    </div>
    <div class="form-group">
      <label>Paket</label>
      <select id="fPaket"></select>
    </div>
    <div id="fBulanGroup" style="display:none">
      <div class="form-group"><label>Isi Setoran Per Bulan (bisa dikosongkan)</label></div>
      <div id="fBulanFields" style="display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" id="btnHapus" onclick="deleteAnggota()" style="display:none">🗑 Hapus</button>
      <button class="btn btn-primary" id="btnSimpan" onclick="saveAnggota()">Simpan</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay hidden" id="importOverlay">
  <div class="modal">
    <h2>⬆️ Import Excel</h2>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">Upload file Excel (.xlsx) dengan format yang sama. Data akan DIGABUNG dengan data saat ini.</p>
    <input type="file" id="importFile" accept=".xlsx,.xls" style="font-family:inherit;font-size:.82rem;color:var(--text)">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeImportModal()">Batal</button>
      <button class="btn btn-primary" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ===================== HELPERS =====================
function getPaket(id){return pakets.find(p=>p.id===id)}
function getHarga(pid){const p=getPaket(pid);return p?p.harga:0}
function getStatus(bayar, harga){
  if(bayar===null||bayar===undefined) return 'belum';
  if(bayar<harga) return 'kurang';
  if(bayar>harga) return 'lebih';
  return 'pas';
}
function rb(n){if(!n&&n!==0)return '-';return 'Rp '+n.toLocaleString('id-ID')+'rb'}
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent='';
  const icon=type==='success'?'✅':'❌';
  t.innerHTML=icon+' '+msg;
  t.className='toast show '+(type);
  setTimeout(()=>{t.className='toast'},2800);
}

}

// ===================== SUMMARY =====================
function renderSummary(){
  const totalAnggota=anggota.length;
  const totalAllTime=anggota.reduce((s,a)=>s+a.bulan.reduce((ss,b)=>ss+(b||0),0),0);
  const bulanTotals=MONTHS.map((_,mi)=>anggota.reduce((s,a)=>s+(a.bulan[mi]||0),0));
  const maxBulan=Math.max(...bulanTotals);
  const kurangCount=anggota.filter(a=>a.bulan[activeBulan]!==null&&a.bulan[activeBulan]<getHarga(a.paket)).length;
  const lebihCount=anggota.filter(a=>a.bulan[activeBulan]!==null&&a.bulan[activeBulan]>getHarga(a.paket)).length;
  const belumCount=anggota.filter(a=>a.bulan[activeBulan]===null||a.bulan[activeBulan]===undefined).length;

  document.getElementById('hTotalAnggota').textContent=totalAnggota;
  document.getElementById('hTotalBulanIni').textContent='Rp '+bulanTotals[activeBulan].toLocaleString('id-ID')+'rb';

  const cards=[
    {icon:'👥',val:totalAnggota,lbl:'Total Anggota',accent:'--accent'},
    {icon:'💰',val:'Rp '+totalAllTime.toLocaleString('id-ID')+'rb',lbl:'Total Terkumpul',accent:'--green'},
    {icon:'🔴',val:kurangCount,lbl:'Kurang (bulan ini)',accent:'--red'},
    {icon:'🟢',val:lebihCount,lbl:'Lebih (bulan ini)',accent:'--green'},
    {icon:'⏳',val:belumCount,lbl:'Belum Bayar (bulan ini)',accent:'--yellow'},
    {icon:'📅',val:'Rp '+maxBulan.toLocaleString('id-ID')+'rb',lbl:'Bulan Terbanyak',accent:'--accent2'},
  ];
  document.getElementById('summaryRow').innerHTML=cards.map(c=>`
    <div class="sum-card" style="--card-accent:var(${c.accent})">
      <div class="sum-card-icon">${c.icon}</div>

}

// ===================== TABLE =====================
function renderTable(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const filterPaket=document.getElementById('filterPaket').value;
  const filterStatus=document.getElementById('filterStatus').value;

  let filtered=anggota.filter(a=>{
    if(search&&!a.nama.toLowerCase().includes(search)) return false;
    if(filterPaket&&a.paket!==filterPaket) return false;
    if(filterStatus){
      const st=getStatus(a.bulan[activeBulan],getHarga(a.paket));
      if(filterStatus!==st) return false;
    }
    return true;
  });

  const monthTotals=MONTHS.map((_,mi)=>filtered.reduce((s,a)=>s+(a.bulan[mi]||0),0));

  let html=`<table><thead><tr>
    <th>No</th><th>Nama</th><th>Paket</th>
    ${MONTHS.map((m,i)=>`<th style="${i===activeBulan?'color:var(--accent);border-bottom-color:var(--accent)':''}">${m}</th>`).join('')}
    <th style="color:var(--accent2)">Total</th><th>Aksi</th>
  </tr></thead><tbody>`;

  filtered.forEach((a,idx)=>{
    const harga=getHarga(a.paket);
    const rowTotal=a.bulan.reduce((s,b)=>s+(b||0),0);
    html+=`<tr>
      <td class="td-no">${idx+1}</td>
      <td class="td-name">${a.nama}</td>
      <td><span class="paket-badge">${a.paket}</span></td>
      ${a.bulan.map((b,mi)=>{
        const st=getStatus(b,harga);
        const isActive=mi===activeBulan;
        let cls='cell-money ';
        if(b===null||b===undefined) cls+='cell-empty';
        else if(st==='kurang') cls+='cell-kurang';
        else if(st==='lebih') cls+='cell-lebih';
        else cls+='cell-pas';
        if(isActive) cls+=' '+('');
        const dot=b===null?'':(st==='kurang'?'<span class="status-dot dot-red"></span>':(st==='lebih'?'<span class="status-dot dot-green"></span>':'<span class="status-dot" style="background:var(--muted)"></span>'));
        return `<td class="${cls}" style="${isActive?'outline:2px solid var(--accent);outline-offset:-1px':''}">${dot}${b!==null&&b!==undefined?b+'rb':'—'}</td>`;
      }).join('')}
      <td class="cell-money row-total-col">${rowTotal>0?rowTotal+'rb':'—'}</td>
      <td><button class="btn btn-ghost" style="padding:4px 10px;font-size:.72rem" onclick="openEditModal(${a.id})">✏️ Edit</button></td>
    </tr>`;
  });

  // Total row
  html+=`<tr class="total-row">
    <td></td><td class="td-name">TOTAL</td><td></td>
    ${monthTotals.map((t,i)=>`<td class="cell-money ${i===activeBulan?'row-total-col':''}">${t>0?t+'rb':'—'}</td>`).join('')}
    <td class="cell-money row-total-col">${filtered.reduce((s,a)=>s+a.bulan.reduce((ss,b)=>ss+(b||0),0),0)}rb</td>
    <td></td>
  </tr>`;
  html+=`</tbody></table>`;
  document.getElementById('tableWrap').innerHTML=html;
}

function refreshModalPaket(sel){
  document.getElementById('fPaket').innerHTML=pakets.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${p.nama} — Rp ${p.harga}rb/bln</option>`).join('');

function closeModal(){document.getElementById('modalOverlay').classList.add('hidden')}

function saveAnggota(){
  const nama=document.getElementById('fNama').value.trim();
  const paket=document.getElementById('fPaket').value;
  if(!nama){showToast('Nama tidak boleh kosong!','error');return;}

  if(editingId!==null){
    const a=anggota.find(x=>x.id===editingId);
    a.nama=nama; a.paket=paket;
    MONTHS.forEach((_,i)=>{
      const v=document.getElementById('fb_'+i)?.value;
      a.bulan[i]=v!==''&&v!==undefined&&v!==null?parseFloat(v):null;
    });
    showToast('Data '+nama+' diperbarui!');
  } else {
    anggota.push({id:nextId++,nama,paket,bulan:Array(MONTHS.length).fill(null)});
    showToast('Anggota '+nama+' ditambahkan!');
  }
  closeModal(); renderAll();
}

function deleteAnggota(){
  if(!confirm('Hapus anggota ini?')) return;
  anggota=anggota.filter(a=>a.id!==editingId);
  closeModal(); renderAll();
  showToast('Anggota dihapus','error');
}

function addPaket(){
  const nama=document.getElementById('newPaketNama').value.trim();
  const harga=parseFloat(document.getElementById('newPaketHarga').value);
  if(!nama||isNaN(harga)){showToast('Isi nama dan harga paket!','error');return;}
  if(pakets.find(p=>p.id===nama)){showToast('Paket sudah ada!','error');return;}
  pakets.push({id:nama,nama,harga});
  document.getElementById('newPaketNama').value='';
  document.getElementById('newPaketHarga').value='';
  renderPaketManager(); refreshPaketFilter();
  showToast('Paket '+nama+' ditambahkan!');
}

function deletePaket(id){
  if(anggota.some(a=>a.paket===id)){showToast('Paket masih digunakan anggota!','error');return;}
  pakets=pakets.filter(p=>p.id!==id);
  renderPaketManager(); refreshPaketFilter();
  showToast('Paket dihapus');
}

// ===================== ANALITIK =====================
function renderAnalitik(){
  const bulanTotals=MONTHS.map((_,mi)=>anggota.reduce((s,a)=>s+(a.bulan[mi]||0),0));
  const maxBulan=Math.max(...bulanTotals,1);

  // Top payers
  const topPayers=[...anggota].sort((a,b)=>{
    const ta=a.bulan.reduce((s,x)=>s+(x||0),0);
    const tb=b.bulan.reduce((s,x)=>s+(x||0),0);
    return tb-ta;
  }).slice(0,10);
  const maxTop=topPayers[0]?topPayers[0].bulan.reduce((s,x)=>s+(x||0),0):1;

  // Paket distribution
  const paketDist={};
  anggota.forEach(a=>{paketDist[a.paket]=(paketDist[a.paket]||0)+1;});
  const maxPaket=Math.max(...Object.values(paketDist),1);

  document.getElementById('analyticsGrid').innerHTML=`
    <div class="ana-card">
      <h3>📅 Total Per Bulan</h3>
      ${MONTHS.map((m,i)=>`
        <div class="bar-row">
          <div class="bar-lbl">${m}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${bulanTotals[i]/maxBulan*100}%"></div></div>
          <div class="bar-val">${bulanTotals[i]>0?bulanTotals[i]+'rb':'—'}</div>
        </div>
      `).join('')}
    </div>
    <div class="ana-card">
      <h3>🏆 Top 10 Penyetor</h3>
      ${topPayers.map(a=>{
        const tot=a.bulan.reduce((s,x)=>s+(x||0),0);
        return `<div class="bar-row">
          <div class="bar-lbl">${a.nama}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${tot/maxTop*100}%;background:linear-gradient(90deg,var(--accent2),var(--accent))"></div></div>
          <div class="bar-val">${tot}rb</div>
        </div>`;
      }).join('')}
    </div>
    <div class="ana-card">
      <h3>📦 Distribusi Paket</h3>
      ${Object.entries(paketDist).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div class="bar-row">
          <div class="bar-lbl">${k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${v/maxPaket*100}%;background:linear-gradient(90deg,var(--green),var(--accent))"></div></div>
          <div class="bar-val">${v} org</div>
        </div>
      `).join('')}
    </div>
    <div class="ana-card">
      <h3>📊 Status Bulan Ini: ${MONTHS[activeBulan]}</h3>
      ${(()=>{
        let ku=0,le=0,pa=0,be=0;
        anggota.forEach(a=>{
          const st=getStatus(a.bulan[activeBulan],getHarga(a.paket));
          if(st==='kurang')ku++;else if(st==='lebih')le++;else if(st==='pas')pa++;else be++;
        });
        const total=anggota.length||1;
        return [
          {lbl:'🔴 Kurang',val:ku,color:'--red'},
          {lbl:'🟢 Lebih',val:le,color:'--green'},
          {lbl:'⚪ Pas / Lunas',val:pa,color:'--muted'},
          {lbl:'⏳ Belum Bayar',val:be,color:'--yellow'},
        ].map(s=>`<div class="bar-row">
          <div class="bar-lbl">${s.lbl}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${s.val/total*100}%;background:var(${s.color})"></div></div>
          <div class="bar-val">${s.val} org</div>
        </div>`).join('');
      })()}
    </div>
  `;
}

// ===================== EXPORT EXCEL =====================
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const ws_data=[];

  // Header row 1
  const h1=['No','Nama','Jenis Paket','Bulan',...Array(MONTHS.length-1).fill(''),'Total'];
  ws_data.push(h1);

  // Header row 2
  ws_data.push(['','','', ...MONTHS,'']);

  // Data rows
  anggota.forEach((a,i)=>{
    const rowTotal=a.bulan.reduce((s,b)=>s+(b||0),0);
    ws_data.push([i+1, a.nama, a.paket, ...a.bulan.map(b=>b!==null&&b!==undefined?b:''), rowTotal]);
  });

  // Total row
  const monthTotals=MONTHS.map((_,mi)=>anggota.reduce((s,a)=>s+(a.bulan[mi]||0),0));
  ws_data.push(['','Total','', ...monthTotals,'']);

  const ws=XLSX.utils.aoa_to_sheet(ws_data);

  // Column widths
  ws['!cols']=[{wch:5},{wch:20},{wch:12},...MONTHS.map(()=>({wch:10})),{wch:10}];

  // Merges
  ws['!merges']=[
    {s:{r:0,c:0},e:{r:1,c:0}}, // No
    {s:{r:0,c:1},e:{r:1,c:1}}, // Nama
    {s:{r:0,c:2},e:{r:1,c:2}}, // Paket
    {s:{r:0,c:3},e:{r:0,c:3+MONTHS.length-1}}, // Bulan header
    {s:{r:0,c:3+MONTHS.length},e:{r:1,c:3+MONTHS.length}}, // Total
  ];

  XLSX.utils.book_append_sheet(wb,'Sheet1',ws);
  XLSX.writeFile(wb,'data_perhitungan_mamah_'+new Date().toLocaleDateString('id-ID').replace(/\//g,'-')+'.xlsx');
  showToast('Excel berhasil diunduh!');
}

// ===================== IMPORT =====================
function openImportModal(){document.getElementById('importOverlay').classList.remove('hidden')}
function closeImportModal(){document.getElementById('importOverlay').classList.add('hidden')}

function doImport(){
  const file=document.getElementById('importFile').files[0];
  if(!file){showToast('Pilih file dulu!','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      let added=0;
      for(let i=2;i<rows.length;i++){
        const r=rows[i];
        if(!r[1]||!r[2]) continue;
        const nama=String(r[1]).trim();
        const paket=String(r[2]).trim();
        if(!nama) continue;
        const bulan=MONTHS.map((_,mi)=>{
          const v=r[3+mi];
          return (v!==undefined&&v!==''&&v!==null)?parseFloat(v):null;
        });
        if(!anggota.find(a=>a.nama.toLowerCase()===nama.toLowerCase())){
          anggota.push({id:nextId++,nama,paket,bulan});
          added++;
        }
      }
      closeImportModal();
      renderAll();
      showToast(`${added} anggota baru diimport!`);
    }catch(err){showToast('Gagal membaca file!','error');}
  };
  reader.readAsArrayBuffer(file);
}

// ===================== INLINE EDIT =====================
document.addEventListener('dblclick',e=>{
  const td=e.target.closest('td.cell-money:not(.row-total-col)');
  if(!td) return;
  // find row and col index from table
  const tr=td.closest('tr');
  const tds=[...tr.querySelectorAll('td')];
  const colIdx=tds.indexOf(td)-3; // 0=No,1=Nama,2=Paket, then months start at 3
  if(colIdx<0||colIdx>=MONTHS.length) return;
  const namaTd=tds[1];
  const nama=namaTd.textContent.trim();
  const a=anggota.find(x=>x.nama===nama);
  if(!a) return;
  const cur=a.bulan[colIdx];
  const inp=document.createElement('input');
  inp.type='number';inp.className='cell-input';inp.value=cur!==null&&cur!==undefined?cur:'';inp.style.width='70px';
  td.innerHTML='';td.appendChild(inp);inp.focus();
  function save(){
    const v=inp.value;
    a.bulan[colIdx]=v!==''?parseFloat(v):null;
    renderAll();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')save();if(ev.key==='Escape'){inp.blur();}});
});

// ===================== RENDER ALL =====================
function renderAll(){
  renderSummary();
  renderMonthTabs();
  renderTable();
  refreshPaketFilter();
  if(currentView==='analitik') renderAnalitik();
  if(currentView==='paket') renderPaketManager();
}

renderAll();
</script>
